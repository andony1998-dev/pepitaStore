<button
  (click)="toggle()"
  title="Ayuda sobre este módulo"
  class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 font-bold text-sm transition-colors cursor-pointer select-none">
  ?
</button>

@if (isOpen()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
    (click)="toggle()">
    <div
      class="bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 p-6"
      (click)="$event.stopPropagation()">
      <div class="flex items-start justify-between mb-3">
        <h3 class="text-lg font-semibold text-slate-800">{{ title }}</h3>
        <button
          (click)="toggle()"
          class="text-slate-400 hover:text-slate-600 ml-4 text-xl leading-none cursor-pointer">
          ✕
        </button>
      </div>
      <p class="text-slate-600 text-sm leading-relaxed">{{ description }}</p>
    </div>
  </div>
}
